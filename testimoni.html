<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil Usaha Buku</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
    
  
<nav>

<h1>Toko Buku Jihan</h1>
<main class="formulir">
    <h2>Berikan Testimoni Anda</h2>

<form id="formTestimoni">
  <label for="nama">Nama:</label>
  <input
    type="text"
    id="nama"
    name="nama"
    required
    placeholder="Nama lengkap"
  >

  <label for="asal">Asal Sekolah / Instansi / Komunitas:</label>
  <input
    type="text"
    id="asal"
    name="asal"
    required
    placeholder="Asal sekolah / instansi / komunitas"
  >

  <label for="email">Email:</label>
  <input
    type="email"
    id="email"
    name="email"
    required
    placeholder="email@gmail.com"
  >

  <label for="judul_buku">Judul Buku yang Dibeli:</label>
  <input
    type="text"
    id="judul"
    name="judul"
    required
    placeholder="Judul buku"
  >

  <label for="pesan">Testimoni Anda:</label>
  <textarea
    id="pesan"
    name="pesan"
    rows="5"
    required
    placeholder="Tulis pengalaman Anda..."
  ></textarea>

  <label for="rating">Rating (1–10):</label>
  <input
    type="number"
    id="rating"
    name="rating"
    min="1"
    max="10"
    required
    placeholder="1 - 10"
  >

  <button type="submit">Kirim Testimoni</button>
</form>

</main>
<footer>
    <p>&copy; 2026 Toko Buku Jihan</p>
</footer>

<script>
    document.getElementById('formTestimoni').addEventListener('submit', function(e) {
        e.preventDefault();

        const nama = document.getElementById('nama').value;
        const asal = document.getElementById('asal').value;
        const email = document.getElementById('email');
        const judul = document.getElementById('judul').value;
        const testimoni = document.getElementById('pesan');
        const rating = document.getElementById('rating');

        const dataBaru = { nama, asal, email, judul, testimoni, rating};

        // Ambil list dari localStorage
        const testimoniList = 
        JSON.parse(localStorage.getItem('testimoniList')) || [];

        // Tambahkan testimoni baru
        testimoniList.push(dataBaru);
         // Simpan kembali ke LocalStorage
         localStorage.setItem('testimoniList', JSON.stringify(testimoniList));

         // Arahkan ke halaman konfirmasi
         window.location.href = 'proses-testimoni.html';
    });
</script>

</body>
</html>
