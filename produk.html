<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toko Buku</title>

<style>

/* Body */
body{
background: linear-gradient(to bottom, #dff6ff, #b3e0ff);
font-family:'Poppins', sans-serif;
margin:20px;
}

/* Navbar */
nav{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
margin-bottom:20px;
}

.nav-menu{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.nav-group{
background: rgba(0,119,182,0.6);
padding:8px 12px;
border-radius:10px;
}

nav a{
color:white;
text-decoration:none;
margin:0 8px;
font-weight:bold;
}

/* Cart */
.cart{
background:#0077b6;
color:white;
padding:10px 15px;
border-radius:10px;
font-weight:bold;
}

/* Produk */
.daftar-produk{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.produk{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 6px 15px rgba(0,119,182,0.2);
text-align:center;
transition:0.3s;
}

.produk:hover{
transform:translateY(-8px);
}

.produk img{
width:150px;
}

/* Rating */
.rating{
color:gold;
margin:5px 0;
}

/* Button */
button{
background:#0077b6;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

</style>

</head>

<body>

<nav>
<div class="nav-menu">
<div class="nav-group"><a href="#">Beranda</a></div>
<div class="nav-group"><a href="#">Produk</a></div>
<div class="nav-group"><a href="#">Kontak</a></div>
</div>

<div class="cart">
🛒 Keranjang: <span id="cartCount">0</span>
</div>
</nav>

<h1>Daftar Produk Buku</h1>

<section class="daftar-produk">

<div class="produk">
<img src="buku 1.jpg">
<h2>Edensor</h2>
<div class="rating">⭐⭐⭐⭐☆</div>
<p>Rp75.000</p>
<button onclick="addToCart()">Tambah ke Keranjang</button>
</div>

<div class="produk">
<img src="buku 2.avif">
<h2>Malioboro</h2>
<div class="rating">⭐⭐⭐⭐⭐</div>
<p>Rp89.000</p>
<button onclick="addToCart()">Tambah ke Keranjang</button>
</div>

<div class="produk">
<img src="buku 3.jpg">
<h2>Wee!!</h2>
<div class="rating">⭐⭐⭐⭐☆</div>
<p>Rp75.000</p>
<button onclick="addToCart()">Tambah ke Keranjang</button>
</div>

</section>

<script>
let count = 0;

function addToCart(){
count++;
document.getElementById("cartCount").innerText = count;
}
</script>

</body>
</html>
