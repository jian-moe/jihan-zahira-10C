<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>Konfirmasi Testimoni</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* BODY */
body{
background: linear-gradient(to bottom, #dff6ff, #b3e0ff);
font-family:'Poppins', Arial, sans-serif;
color:#033e6b;
margin:20px;
animation: fadeIn 1.5s ease-in;
}

/* ANIMASI */
@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

@keyframes slideDown{
from{transform:translateY(-30px); opacity:0;}
to{transform:translateY(0); opacity:1;}
}

@keyframes zoomIn{
from{transform:scale(0.8); opacity:0;}
to{transform:scale(1); opacity:1;}
}

/* NAVBAR MODERN */
nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
margin-bottom:30px;
padding:12px;
background: linear-gradient(to right, #0077b6, #00b4d8);
border-radius:15px;
box-shadow:0 6px 20px rgba(0,119,182,0.3);
animation: slideDown 1s ease;
}

.nav-group{
display:flex;
gap:10px;
background: rgba(255,255,255,0.15);
backdrop-filter: blur(10px);
padding:8px 12px;
border-radius:10px;
}

/* LINK */
nav a{
color:white;
text-decoration:none;
font-weight:bold;
padding:6px 12px;
border-radius:8px;
transition:0.3s;
position:relative;
}

/* HOVER */
nav a:hover{
background:white;
color:#0077b6;
transform:translateY(-2px);
box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

/* GARIS ANIMASI */
nav a::after{
content:"";
display:block;
height:2px;
width:0;
background:white;
transition:0.3s;
margin:auto;
}

nav a:hover::after{
width:80%;
}

/* KONTAINER */
.konfirmasi{
max-width:700px;
margin:auto;
background:white;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 8px 20px rgba(0,119,182,0.25);
animation: zoomIn 1s ease;
}

/* ICON */
.success-icon{
font-size:60px;
margin-bottom:15px;
}

/* TEXT */
.konfirmasi h1{
margin-bottom:15px;
color:#0077b6;
}

/* BUTTON LINK */
.konfirmasi a{
display:inline-block;
margin-top:15px;
padding:10px 18px;
background: linear-gradient(to right, #0077b6, #00b4d8);
color:white;
text-decoration:none;
border-radius:10px;
transition:0.3s;
}

.konfirmasi a:hover{
transform:scale(1.05);
}

/* FOOTER */
footer{
margin-top:40px;
text-align:center;
padding:15px;
background: linear-gradient(to right, #0077b6, #00b4d8);
color:white;
border-radius:10px;
}

</style>

</head>
